<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Expense Tracker - Standalone Demo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>

  <style>
    :root {
      --bg-base: #0d0e12;
      --bg-surface: #141722;
      --bg-card: rgba(26, 29, 41, 0.72);
      --bg-card-hover: rgba(34, 38, 54, 0.9);
      --border-color: rgba(255, 255, 255, 0.1);
      --border-hover: rgba(255, 255, 255, 0.18);
      --color-primary: #10b981;
      --color-secondary: #8b5cf6;
      --color-danger: #ef4444;
      --color-info: #3b82f6;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --text-muted: #6b7280;
      --shadow-md: 0 18px 44px rgba(0, 0, 0, 0.34);
      font-family: Inter, system-ui, sans-serif;
    }

    [data-theme="light"] {
      --bg-base: #f3f6fb;
      --bg-surface: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.86);
      --bg-card-hover: rgba(255, 255, 255, 0.95);
      --border-color: rgba(17, 24, 39, 0.1);
      --border-hover: rgba(17, 24, 39, 0.18);
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --text-muted: #6b7280;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--text-primary);
      background:
        radial-gradient(circle at 12% 8%, rgba(16, 185, 129, 0.18), transparent 28rem),
        radial-gradient(circle at 88% 10%, rgba(139, 92, 246, 0.16), transparent 28rem),
        var(--bg-base);
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .glass-panel {
      background: rgba(20, 23, 34, 0.78);
      border-bottom: 1px solid var(--border-color);
      backdrop-filter: blur(14px);
    }

    [data-theme="light"] .glass-panel {
      background: rgba(255, 255, 255, 0.82);
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      padding: 14px 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      font-size: 1.15rem;
    }

    .brand-mark {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: #ffffff;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
      box-shadow: 0 12px 28px rgba(16, 185, 129, 0.24);
    }

    .main-wrapper {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    .sidebar {
      position: sticky;
      top: 72px;
      height: calc(100vh - 72px);
      padding: 22px 16px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border-color);
    }

    .sidebar nav {
      display: grid;
      gap: 8px;
    }

    .nav-link {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      color: var(--text-secondary);
      background: transparent;
      cursor: pointer;
      font-weight: 700;
      text-align: left;
    }

    .nav-link:hover,
    .nav-link.active {
      color: var(--text-primary);
      background: rgba(16, 185, 129, 0.12);
    }

    .content-area {
      width: 100%;
      max-width: 1240px;
      margin: 0 auto;
      padding: 30px;
    }

    .page-stack {
      display: grid;
      gap: 24px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .page-header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
    }

    .muted {
      color: var(--text-secondary);
    }

    .grid {
      display: grid;
      gap: 20px;
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .grid-2 {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .glass-card {
      padding: 22px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 18px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(14px);
    }

    .glass-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
    }

    .stat-value {
      display: block;
      margin-top: 10px;
      font-size: 1.85rem;
      font-weight: 800;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: 1px solid transparent;
      border-radius: 12px;
      padding: 10px 16px;
      cursor: pointer;
      font-weight: 800;
    }

    .btn-primary {
      color: #ffffff;
      background: linear-gradient(135deg, var(--color-primary), #059669);
      box-shadow: 0 10px 26px rgba(16, 185, 129, 0.28);
    }

    .btn-secondary {
      color: var(--text-primary);
      background: var(--bg-card);
      border-color: var(--border-color);
    }

    .input,
    .select {
      width: 100%;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.04);
    }

    [data-theme="light"] .input,
    [data-theme="light"] .select {
      background: rgba(255, 255, 255, 0.78);
    }

    .input:focus,
    .select:focus {
      border-color: var(--color-primary);
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.16);
    }

    .form-group {
      display: grid;
      gap: 8px;
    }

    .label {
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px;
      border: 1px solid var(--border-color);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .progress {
      height: 9px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    }

    .currency-preview {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 18px;
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: grid;
      place-items: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
    }

    .modal {
      width: min(520px, 100%);
    }

    footer {
      padding: 18px;
      color: var(--text-muted);
      text-align: center;
      border-top: 1px solid var(--border-color);
    }

    @media (max-width: 820px) {
      .main-wrapper {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--border-color);
        overflow-x: auto;
      }

      .sidebar nav {
        display: flex;
        min-width: max-content;
      }

      .content-area {
        padding: 18px;
      }

      .grid-2,
      .grid-3 {
        grid-template-columns: 1fr;
      }

      .page-header,
      .row {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div id="demo-root"></div>

  <script type="text/babel">
    const { useEffect, useMemo, useState } = React;

    const currencies = [
      { code: "INR", name: "Indian Rupee", symbol: "\u20b9" },
      { code: "USD", name: "US Dollar", symbol: "$" },
      { code: "EUR", name: "Euro", symbol: "\u20ac" },
      { code: "GBP", name: "British Pound", symbol: "\u00a3" },
      { code: "JPY", name: "Japanese Yen", symbol: "\u00a5" },
      { code: "CNY", name: "Chinese Yuan", symbol: "\u00a5" },
      { code: "AUD", name: "Australian Dollar", symbol: "A$" },
      { code: "CAD", name: "Canadian Dollar", symbol: "C$" },
      { code: "SGD", name: "Singapore Dollar", symbol: "S$" },
      { code: "AED", name: "UAE Dirham", symbol: "\u062f.\u0625" },
      { code: "SAR", name: "Saudi Riyal", symbol: "\ufdfc" },
      { code: "QAR", name: "Qatari Riyal", symbol: "\ufdfc" },
      { code: "KWD", name: "Kuwaiti Dinar", symbol: "\u062f.\u0643" },
      { code: "CHF", name: "Swiss Franc", symbol: "CHF" },
      { code: "NZD", name: "New Zealand Dollar", symbol: "NZ$" },
      { code: "HKD", name: "Hong Kong Dollar", symbol: "HK$" },
      { code: "KRW", name: "South Korean Won", symbol: "\u20a9" },
      { code: "THB", name: "Thai Baht", symbol: "\u0e3f" },
      { code: "MYR", name: "Malaysian Ringgit", symbol: "RM" },
      { code: "IDR", name: "Indonesian Rupiah", symbol: "Rp" },
      { code: "PHP", name: "Philippine Peso", symbol: "\u20b1" },
      { code: "VND", name: "Vietnamese Dong", symbol: "\u20ab" },
      { code: "ZAR", name: "South African Rand", symbol: "R" },
      { code: "BRL", name: "Brazilian Real", symbol: "R$" },
      { code: "MXN", name: "Mexican Peso", symbol: "Mex$" },
      { code: "RUB", name: "Russian Ruble", symbol: "\u20bd" },
      { code: "TRY", name: "Turkish Lira", symbol: "\u20ba" },
      { code: "SEK", name: "Swedish Krona", symbol: "kr" },
      { code: "NOK", name: "Norwegian Krone", symbol: "kr" },
      { code: "DKK", name: "Danish Krone", symbol: "kr" }
    ];

    const categories = ["Food", "Entertainment", "Utilities", "Shopping", "Travel", "Other"];

    const getCurrencySymbol = (code) => currencies.find((item) => item.code === code)?.symbol || code;

    const formatMoney = (amount, code) => {
      const symbol = getCurrencySymbol(code);
      return `${symbol}${Number(amount || 0).toLocaleString(undefined, {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    };

    const formatDate = (dateString) => {
      const date = new Date(dateString);
      return Number.isNaN(date.getTime())
        ? dateString
        : date.toLocaleDateString(undefined, { year: "numeric", month: "short", day: "numeric" });
    };

    function App() {
      const [theme, setTheme] = useState("dark");
      const [currentTab, setCurrentTab] = useState("dashboard");
      const [modalOpen, setModalOpen] = useState(false);
      const [user, setUser] = useState({
        username: "Demo User",
        email: "demo@smartexpense.com",
        currency: "INR",
        categoryBudgets: {
          Food: 12000,
          Entertainment: 6000,
          Utilities: 9000,
          Shopping: 7500,
          Travel: 5000,
          Other: 3000
        }
      });

      const [wallets, setWallets] = useState([
        { _id: "wallet-1", name: "Bank Account", balance: 54200.5, type: "Bank Account", color: "#10b981" },
        { _id: "wallet-2", name: "Cash Wallet", balance: 3500, type: "Cash", color: "#8b5cf6" },
        { _id: "wallet-3", name: "Credit Card", balance: -12500.8, type: "Credit Card", color: "#ef4444" }
      ]);

      const [expenses, setExpenses] = useState([
        { _id: "exp-1", title: "Weekly Groceries", amount: 1450.2, category: "Food", date: new Date().toISOString().split("T")[0], description: "Organic supplies", walletId: "wallet-1" },
        { _id: "exp-2", title: "Streaming Subscription", amount: 699, category: "Entertainment", date: new Date(Date.now() - 86400000).toISOString().split("T")[0], description: "Monthly plan", walletId: "wallet-3" },
        { _id: "exp-3", title: "Fuel Refill", amount: 3200, category: "Travel", date: new Date(Date.now() - 172800000).toISOString().split("T")[0], description: "Vehicle fuel", walletId: "wallet-2" },
        { _id: "exp-4", title: "Electric Bill", amount: 2450, category: "Utilities", date: new Date(Date.now() - 259200000).toISOString().split("T")[0], description: "Monthly electricity", walletId: "wallet-1" }
      ]);

      const goals = [
        { _id: "goal-1", name: "Travel Fund", targetAmount: 150000, currentAmount: 68000, category: "Travel" },
        { _id: "goal-2", name: "Emergency Fund", targetAmount: 300000, currentAmount: 185000, category: "Savings" },
        { _id: "goal-3", name: "New Laptop", targetAmount: 180000, currentAmount: 92000, category: "Electronics" }
      ];

      const currency = user.currency;

      useEffect(() => {
        document.documentElement.setAttribute("data-theme", theme);
      }, [theme]);

      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [currentTab, modalOpen, theme, user.currency, expenses, wallets]);

      const categoryTotals = useMemo(() => {
        return expenses.reduce((totals, expense) => {
          totals[expense.category] = (totals[expense.category] || 0) + Number(expense.amount || 0);
          return totals;
        }, {});
      }, [expenses]);

      const totalBalance = useMemo(() => wallets.reduce((sum, wallet) => sum + wallet.balance, 0), [wallets]);
      const monthlySpent = useMemo(() => expenses.reduce((sum, expense) => sum + expense.amount, 0), [expenses]);
      const totalBudget = useMemo(() => Object.values(user.categoryBudgets).reduce((sum, value) => sum + Number(value || 0), 0), [user.categoryBudgets]);

      const handleAddExpense = (formData) => {
        const amount = Number(formData.amount || 0);
        const expense = {
          _id: `exp-${Date.now()}`,
          ...formData,
          amount
        };

        setExpenses((current) => [expense, ...current]);
        setWallets((current) =>
          current.map((wallet) => (wallet._id === formData.walletId ? { ...wallet, balance: wallet.balance - amount } : wallet))
        );
        setModalOpen(false);
      };

      const handleDeleteExpense = (id) => {
        const target = expenses.find((expense) => expense._id === id);
        setExpenses((current) => current.filter((expense) => expense._id !== id));

        if (target?.walletId) {
          setWallets((current) =>
            current.map((wallet) =>
              wallet._id === target.walletId ? { ...wallet, balance: wallet.balance + target.amount } : wallet
            )
          );
        }
      };

      const updateBudget = (category, value) => {
        const amount = Number(value);
        setUser((current) => ({
          ...current,
          categoryBudgets: {
            ...current.categoryBudgets,
            [category]: Number.isNaN(amount) ? 0 : amount
          }
        }));
      };

      return (
        <div className="app-container">
          <header className="header glass-panel">
            <div className="brand">
              <span className="brand-mark"><i data-lucide="wallet-cards"></i></span>
              <span>Smart Expense Demo</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
              <select
                className="select"
                style={{ minWidth: 230 }}
                value={currency}
                onChange={(event) => setUser((current) => ({ ...current, currency: event.target.value }))}
              >
                {currencies.map((item) => (
                  <option key={item.code} value={item.code}>
                    {item.symbol} {item.name} ({item.code})
                  </option>
                ))}
              </select>
              <button className="btn btn-secondary" onClick={() => setTheme(theme === "dark" ? "light" : "dark")}>
                <i data-lucide={theme === "dark" ? "sun" : "moon"}></i>
                Theme
              </button>
            </div>
          </header>

          <div className="main-wrapper">
            <aside className="sidebar">
              <nav>
                {[
                  ["dashboard", "layout-dashboard", "Dashboard"],
                  ["expenses", "receipt", "Expenses"],
                  ["reports", "file-spreadsheet", "Reports"],
                  ["analytics", "bar-chart-3", "Analytics"],
                  ["goals", "target", "Goals"],
                  ["wallets", "wallet", "Wallets"],
                  ["scanner", "scan-line", "Receipt Scanner"],
                  ["settings", "settings", "Settings"]
                ].map(([tab, icon, label]) => (
                  <button
                    key={tab}
                    className={`nav-link ${currentTab === tab ? "active" : ""}`}
                    onClick={() => setCurrentTab(tab)}
                  >
                    <i data-lucide={icon}></i>
                    {label}
                  </button>
                ))}
              </nav>
            </aside>

            <main className="content-area">
              {currentTab === "dashboard" && (
                <section className="page-stack">
                  <div className="page-header">
                    <div>
                      <h1>Dashboard Portfolio</h1>
                      <p className="muted">All totals now follow the selected default currency.</p>
                    </div>
                    <button className="btn btn-primary" onClick={() => setModalOpen(true)}>
                      <i data-lucide="plus"></i>
                      Log Expense
                    </button>
                  </div>

                  <div className="grid grid-3">
                    <div className="glass-card">
                      <span className="muted">Liquid Net Worth</span>
                      <strong className="stat-value">{formatMoney(totalBalance, currency)}</strong>
                    </div>
                    <div className="glass-card">
                      <span className="muted">Monthly Spend</span>
                      <strong className="stat-value">{formatMoney(monthlySpent, currency)}</strong>
                    </div>
                    <div className="glass-card">
                      <span className="muted">Allocated Budgets</span>
                      <strong className="stat-value">{formatMoney(totalBudget, currency)}</strong>
                    </div>
                  </div>

                  <div className="glass-card">
                    <h2>Category Allocations</h2>
                    <div className="list" style={{ marginTop: 18 }}>
                      {Object.entries(categoryTotals).map(([category, value]) => {
                        const percent = monthlySpent ? Math.round((value / monthlySpent) * 100) : 0;
                        return (
                          <div key={category}>
                            <div className="row">
                              <strong>{category}</strong>
                              <span>{formatMoney(value, currency)} · {percent}%</span>
                            </div>
                            <div className="progress" style={{ marginTop: 8 }}>
                              <span style={{ width: `${percent}%` }}></span>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </section>
              )}

              {currentTab === "expenses" && (
                <section className="page-stack">
                  <div className="page-header">
                    <h1>Transactions</h1>
                    <button className="btn btn-primary" onClick={() => setModalOpen(true)}>
                      <i data-lucide="plus"></i>
                      Add Expense
                    </button>
                  </div>
                  <div className="list">
                    {expenses.map((expense) => (
                      <div key={expense._id} className="row">
                        <div>
                          <h3>{expense.title}</h3>
                          <p className="muted">{expense.category} · {formatDate(expense.date)} · {expense.description}</p>
                        </div>
                        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                          <strong>-{formatMoney(expense.amount, currency)}</strong>
                          <button className="btn btn-secondary" onClick={() => handleDeleteExpense(expense._id)}>
                            <i data-lucide="trash-2"></i>
                          </button>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {currentTab === "reports" && (
                <section className="glass-card page-stack">
                  <h1>Monthly Statement</h1>
                  {Object.entries(categoryTotals).map(([category, value]) => (
                    <div key={category} className="row">
                      <strong>{category}</strong>
                      <span>{formatMoney(value, currency)}</span>
                    </div>
                  ))}
                </section>
              )}

              {currentTab === "analytics" && (
                <section className="glass-card page-stack">
                  <h1>Spending Analytics</h1>
                  {Object.entries(categoryTotals).map(([category, value]) => {
                    const percent = monthlySpent ? Math.round((value / monthlySpent) * 100) : 0;
                    return (
                      <div key={category}>
                        <div className="row">
                          <strong>{category}</strong>
                          <span>{percent}% · {formatMoney(value, currency)}</span>
                        </div>
                        <div className="progress" style={{ marginTop: 8 }}>
                          <span style={{ width: `${percent}%` }}></span>
                        </div>
                      </div>
                    );
                  })}
                </section>
              )}

              {currentTab === "goals" && (
                <section className="page-stack">
                  <h1>Saving Goals</h1>
                  <div className="grid grid-3">
                    {goals.map((goal) => {
                      const percent = Math.min(100, Math.round((goal.currentAmount / goal.targetAmount) * 100));
                      return (
                        <div key={goal._id} className="glass-card">
                          <h2>{goal.name}</h2>
                          <p className="muted">{goal.category}</p>
                          <p style={{ margin: "14px 0" }}>
                            {formatMoney(goal.currentAmount, currency)} of {formatMoney(goal.targetAmount, currency)}
                          </p>
                          <div className="progress">
                            <span style={{ width: `${percent}%` }}></span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </section>
              )}

              {currentTab === "wallets" && (
                <section className="page-stack">
                  <h1>Wallets & Accounts</h1>
                  <div className="grid grid-3">
                    {wallets.map((wallet) => (
                      <div key={wallet._id} className="glass-card" style={{ borderLeft: `4px solid ${wallet.color}` }}>
                        <h2>{wallet.name}</h2>
                        <p className="muted">{wallet.type}</p>
                        <strong className="stat-value">{formatMoney(wallet.balance, currency)}</strong>
                      </div>
                    ))}
                  </div>
                </section>
              )}

              {currentTab === "scanner" && (
                <section className="glass-card page-stack" style={{ textAlign: "center" }}>
                  <i data-lucide="upload-cloud" style={{ width: 54, height: 54, color: "var(--text-secondary)" }}></i>
                  <h1>Receipt OCR Scanner</h1>
                  <p className="muted">Demo scanner uses the selected currency for created expenses.</p>
                  <button
                    className="btn btn-primary"
                    onClick={() =>
                      handleAddExpense({
                        title: "Receipt Scan Demo",
                        amount: 2450,
                        category: "Food",
                        date: new Date().toISOString().split("T")[0],
                        description: "Simulated OCR match",
                        walletId: wallets[0]._id
                      })
                    }
                  >
                    Simulate Receipt Upload
                  </button>
                </section>
              )}

              {currentTab === "settings" && (
                <section className="page-stack">
                  <div className="glass-card">
                    <div className="page-header">
                      <div>
                        <h1>Settings</h1>
                        <p className="muted">Expanded currency options are available here and in the top bar.</p>
                      </div>
                      <strong className="currency-preview">{getCurrencySymbol(currency)}</strong>
                    </div>

                    <div className="form-group" style={{ marginTop: 20 }}>
                      <label className="label" htmlFor="defaultCurrency">Default Currency</label>
                      <select
                        id="defaultCurrency"
                        className="select"
                        value={currency}
                        onChange={(event) => setUser((current) => ({ ...current, currency: event.target.value }))}
                      >
                        {currencies.map((item) => (
                          <option key={item.code} value={item.code}>
                            {item.symbol} {item.name} ({item.code})
                          </option>
                        ))}
                      </select>
                    </div>
                  </div>

                  <div className="glass-card">
                    <h2>Budget Alert Ceilings</h2>
                    <div className="grid grid-2" style={{ marginTop: 18 }}>
                      {categories.map((category) => (
                        <div key={category} className="form-group">
                          <label className="label" htmlFor={`budget-${category}`}>
                            {category} Budget Ceiling ({getCurrencySymbol(currency)})
                          </label>
                          <input
                            id={`budget-${category}`}
                            type="number"
                            className="input"
                            min="0"
                            value={user.categoryBudgets[category]}
                            onChange={(event) => updateBudget(category, event.target.value)}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                </section>
              )}
            </main>
          </div>

          {modalOpen && (
            <div className="modal-overlay" onClick={() => setModalOpen(false)}>
              <div className="glass-card modal" onClick={(event) => event.stopPropagation()}>
                <h2 style={{ marginBottom: 16 }}>Log New Expense</h2>
                <form
                  className="page-stack"
                  onSubmit={(event) => {
                    event.preventDefault();
                    const form = event.currentTarget;
                    handleAddExpense({
                      title: form.title.value,
                      amount: form.amount.value,
                      category: form.category.value,
                      date: form.date.value,
                      description: form.description.value,
                      walletId: form.walletId.value
                    });
                  }}
                >
                  <Input label="Title" id="title" required />
                  <Input label={`Amount (${getCurrencySymbol(currency)})`} id="amount" type="number" step="0.01" required />

                  <div className="form-group">
                    <label className="label" htmlFor="category">Category</label>
                    <select id="category" name="category" className="select">
                      {categories.map((category) => (
                        <option key={category} value={category}>{category}</option>
                      ))}
                    </select>
                  </div>

                  <Input label="Date" id="date" type="date" defaultValue={new Date().toISOString().split("T")[0]} required />

                  <div className="form-group">
                    <label className="label" htmlFor="walletId">Link Account Wallet</label>
                    <select id="walletId" name="walletId" className="select">
                      {wallets.map((wallet) => (
                        <option key={wallet._id} value={wallet._id}>
                          {wallet.name} ({formatMoney(wallet.balance, currency)})
                        </option>
                      ))}
                    </select>
                  </div>

                  <Input label="Notes" id="description" />

                  <div style={{ display: "flex", gap: 12, justifyContent: "flex-end", flexWrap: "wrap" }}>
                    <button type="button" className="btn btn-secondary" onClick={() => setModalOpen(false)}>Cancel</button>
                    <button type="submit" className="btn btn-primary">Add Expense</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <footer>Smart Expense Tracker Standalone Demo · Multi-currency ready</footer>
        </div>
      );
    }

    function Input({ label, id, type = "text", required = false, defaultValue = "" }) {
      return (
        <div className="form-group">
          <label htmlFor={id} className="label">{label}</label>
          <input type={type} id={id} name={id} required={required} defaultValue={defaultValue} className="input" />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("demo-root"));
    root.render(<App />);
  </script>
</body>
</html>
